<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TiffyAI Sovereign Gateway - Registration</title>
    <style>
        body { background: #05070a; font-family: 'Orbitron', sans-serif; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; padding: 25px; background: rgba(10, 15, 24, 0.75); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        h1, h2 { color: #00f0ff; text-align: center; font-size: 18px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #fff; box-sizing: border-box; }
        button { background: linear-gradient(135deg, #00f0ff, #0088ff); cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .hidden { display: none !important; }
        
        /* Verification Status Glow */
        #statusIndicator { text-align: center; padding: 10px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; }
        .status-pending { border: 1px solid #ff007f; color: #ff007f; box-shadow: 0 0 10px #ff007f; }
        .status-verified { border: 1px solid #00ff41; color: #00ff41; box-shadow: 0 0 15px #00ff41; }
        
        #balanceSection { text-align: center; margin: 20px 0; font-size: 1.2rem; }
        canvas { width: 100%; margin-top: 10px; border-radius: 12px; border: 1px solid #00f0ff; }
    </style>
</head>
<body onload="initUI()">

<div class="container" id="regForm">
    <!-- Verification Status Display -->
    <div id="statusIndicator">PENDING VERIFICATION</div>
    
    <h1>BUSINESS REGISTRATION</h1>
    
    <div id="balanceSection">
        <p>Tiffy Tokens: <span id="tokenDisplay">0.00</span></p>
        <p>Nitro TUSD: <span id="nitroDisplay">0.00</span></p>
    </div>

    <input type="text" id="bizName" placeholder="Business Name">
    <input type="text" id="walletAddress" placeholder="Wallet Address">
    
    <h3>Identity Verification</h3>
    <video id="video" autoplay style="width:100%; border-radius:12px;"></video>
    <canvas id="canvas" class="hidden"></canvas>
    <button onclick="takeSelfie()">Capture ID Selfie</button>
    
    <label style="display:block; margin-top:15px; font-size: 12px; color: #888;">Upload ID Card</label>
    <input type="file" id="idFile" accept="image/*,application/pdf">
    
    <button onclick="submitRegistration()">COMMIT TO LEDGER</button>
</div>

<div id="successMessage" class="hidden">
    <h1>REGISTRATION SUCCESSFUL</h1>
    <p>Your business identity has been fingerprinted to the local ledger.</p>
    <button onclick="window.location.reload()">RESTART</button>
</div>

<script>
    function initUI() {
        loadBalances();
        updateStatus();
    }

    function updateStatus() {
        const statusDiv = document.getElementById('statusIndicator');
        if (localStorage.getItem("KYC_Verified_Hash")) {
            statusDiv.innerText = "VERIFIED";
            statusDiv.className = "status-verified";
        } else {
            statusDiv.innerText = "PENDING VERIFICATION";
            statusDiv.className = "status-pending";
        }
    }

    function loadBalances() {
        document.getElementById('tokenDisplay').innerText = localStorage.getItem("Tiffy_Harvest_Pending") || "0.00";
        document.getElementById('nitroDisplay').innerText = localStorage.getItem("TUSD_Nitro_Storage") || "0.00";
    }

    async function takeSelfie() {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.classList.remove('hidden');
        alert("Selfie Captured!");
    }

    async function submitRegistration() {
        const idFile = document.getElementById("idFile").files[0];
        if(!idFile) { alert("Please upload your ID Card."); return; }
        
        const data = `${document.getElementById("bizName").value}|${document.getElementById('walletAddress').value}|${Date.now()}`;
        const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        
        localStorage.setItem("KYC_Verified_Hash", hashHex);
        
        document.getElementById('regForm').classList.add('hidden');
        document.getElementById('successMessage').classList.remove('hidden');
    }

    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
        document.getElementById('video').srcObject = stream;
    });
</script>
</body>
</html>
