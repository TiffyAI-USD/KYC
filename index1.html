<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TiffyAI Sovereign Gateway - Registration</title>
    <style>
        :root {
            --gold-gradient: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --shocking-pink: #ff007f;
            --electric-blue: #00f0ff;
            --black: #050505;
        }

        body { 
            background: var(--black); 
            font-family: 'Orbitron', sans-serif; 
            color: #fff; 
            margin: 0; 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { 
            width: 90%; 
            max-width: 600px; 
            padding: 40px; 
            background: #0a0a0a; 
            border: 1px solid #333; 
            border-radius: 4px; 
            box-shadow: 0 0 40px rgba(191, 149, 63, 0.15);
        }

        h1, h3 { 
            text-align: center; 
            text-transform: uppercase; 
            letter-spacing: 3px;
            color: #fff;
        }

        input { 
            width: 100%; 
            padding: 18px; 
            margin-top: 15px; 
            border-radius: 2px; 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
            box-sizing: border-box; 
            font-size: 16px;
        }

        /* Gold Buttons */
        button { 
            width: 100%; 
            padding: 18px; 
            margin-top: 20px; 
            border-radius: 2px; 
            background: var(--gold-gradient);
            border: none;
            color: var(--black);
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: scale(1.02); }

        /* Glowing Balances */
        #balanceSection { 
            text-align: center; 
            margin: 30px 0; 
            font-size: 1.6rem; 
            font-weight: bold;
        }
        
        .glow-pink { color: var(--shocking-pink); text-shadow: 0 0 10px var(--shocking-pink); }
        .glow-blue { color: var(--electric-blue); text-shadow: 0 0 10px var(--electric-blue); }

        .hidden { display: none !important; }
        
        #statusIndicator { 
            text-align: center; 
            padding: 15px; 
            border: 1px solid #555; 
            margin-bottom: 30px; 
            text-transform: uppercase; 
            color: #888;
        }
        
        #video { width: 100%; border: 1px solid #333; margin-top: 10px; }
        label { margin-top: 20px; display: block; color: #bf953f; font-size: 14px; }
    </style>
</head>
<body onload="initUI()">

<div class="container" id="regForm">
    <div id="statusIndicator">PENDING VERIFICATION</div>
    
    <h1>Business Registration</h1>
    
    <div id="balanceSection">
        <div>Tiffy Tokens: <span id="tokenDisplay" class="glow-pink">0.00</span></div>
        <div>Nitro TUSD: <span id="nitroDisplay" class="glow-blue">0.00</span></div>
    </div>

    <input type="text" id="bizName" placeholder="Business Name">
    <input type="text" id="walletAddress" placeholder="TiffyAI Token or BNB Wallet Address">
    
    <h3>Identity Verification</h3>
    <video id="video" autoplay></video>
    <button onclick="takeSelfie()">Capture ID Selfie</button>
    
    <label>Upload ID Card</label>
    <input type="file" id="idFile" accept="image/*,application/pdf">
    
    <button onclick="submitRegistration()">Commit to Ledger</button>
</div>

<script>
    function initUI() {
        document.getElementById('tokenDisplay').innerText = localStorage.getItem("Tiffy_Harvest_Pending") || "0.00";
        document.getElementById('nitroDisplay').innerText = localStorage.getItem("TUSD_Nitro_Storage") || "0.00";
    }

    async function submitRegistration() {
        const idFile = document.getElementById("idFile").files[0];
        if(!idFile) { alert("Please attach ID documentation."); return; }
        
        const data = `${document.getElementById("bizName").value}|${document.getElementById('walletAddress').value}|${Date.now()}`;
        const hashBuffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(data));
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        
        localStorage.setItem("KYC_Verified_Hash", hashHex);
        alert("Registration Committed to Ledger.");
        window.location.reload();
    }

    navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
        document.getElementById('video').srcObject = stream;
    });
</script>
</body>
</html>
