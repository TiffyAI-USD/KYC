<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TiffyAI Sovereign Gateway - Registration</title>
    <style>
        body { background: #05070a; font-family: 'Orbitron', sans-serif; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; padding: 25px; background: rgba(10, 15, 24, 0.75); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; }
        h1, h2 { color: #00f0ff; text-align: center; font-size: 18px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #fff; box-sizing: border-box; }
        button { background: linear-gradient(135deg, #00f0ff, #0088ff); cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .hidden { display: none; }
        #balanceSection { text-align: center; margin: 20px 0; font-size: 1.2rem; }
    </style>
</head>
<body onload="loadBalances()">

<div class="container">
    <h1>BUSINESS REGISTRATION</h1>
    
    <div id="balanceSection">
        <p>Tiffy Tokens: <span id="tokenDisplay">0.00</span></p>
        <p>Nitro TUSD: <span id="nitroDisplay">0.00</span></p>
    </div>

    <input type="text" id="bizName" placeholder="Business Name">
    <input type="text" id="walletAddress" placeholder="Wallet Address">
    
    <h3>Identity Verification</h3>
    <video id="video" autoplay style="width:100%; border-radius:12px;"></video>
    <button onclick="takeSelfie()">Capture ID Selfie</button>
    
    <!-- Updated Label for ID Document -->
    <label for="idFile" style="display:block; margin-top:15px; font-size: 12px; color: #888;">Upload ID Card</label>
    <input type="file" id="idFile" accept="image/*,application/pdf">
    
    <button onclick="submitRegistration()">COMMIT TO LEDGER</button>
</div>

<script>
    function loadBalances() {
        const tokens = parseFloat(localStorage.getItem("Tiffy_Harvest_Pending") || "0.00");
        const nitro = parseFloat(localStorage.getItem("TUSD_Nitro_Storage") || "0.00");
        document.getElementById('tokenDisplay').innerText = tokens.toFixed(2);
        document.getElementById('nitroDisplay').innerText = nitro.toFixed(2);
    }

    async function takeSelfie() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
        } catch (e) { alert("Camera access required."); }
    }

    async function submitRegistration() {
        const bizName = document.getElementById("bizName").value;
        const idFile = document.getElementById("idFile").files[0];
        if(!idFile) { alert("Please upload your ID Card."); return; }
        
        const data = `${bizName}|${document.getElementById('walletAddress').value}|${Date.now()}`;
        const encoder = new TextEncoder();
        const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(data));
        const hashHex = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        
        localStorage.setItem("KYC_Verified_Hash", hashHex);
        alert("Success. Business Registration Fingerprint: " + hashHex);
    }
</script>
</body>
</html>
